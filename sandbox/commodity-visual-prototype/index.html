<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contango | Commodity Price Watch</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="nav" role="navigation" aria-label="Contango sandbox navigation">
      <div class="nav-logo">Contango<span class="dot"></span></div>
    </nav>

    <div class="filter-wrap">
      <div class="filter-bar">
        <button class="filter-pill is-selected" type="button" data-group="energy" aria-pressed="true">Energy</button>
        <button class="filter-pill is-selected" type="button" data-group="metals" aria-pressed="true">Metals</button>
        <button class="filter-pill is-selected" type="button" data-group="agri" aria-pressed="true">Agriculture</button>
      </div>
    </div>

    <main class="page-shell">
      <header class="masthead">
        <h1 class="masthead-headline">PriceWatch</h1>
      </header>

      <section class="viz-grid-featured" id="featured-grid" aria-label="Energy visual cards"></section>

      <section class="metals-section" aria-label="Periodic metal visual cards">
        <div class="section-head">Periodic Metals</div>
        <div class="metals-row" id="metals-grid"></div>
      </section>

      <section class="agri-section" aria-label="Agriculture and soft commodities visual cards">
        <div class="section-head">Agriculture &amp; Softs</div>
        <div class="agri-row" id="agri-grid"></div>
      </section>
    </main>

    <div class="detail-overlay" id="detail-overlay" hidden>
      <div class="detail-stage" id="detail-stage" role="dialog" aria-modal="true" aria-label="Commodity detail view">
        <button class="detail-close" id="detail-close" type="button" aria-label="Close commodity details">Close</button>
        <div class="detail-flip-card" id="detail-flip-card">
          <div class="detail-face detail-front" id="detail-front"></div>
          <div class="detail-face detail-back" id="detail-back"></div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-left">© 2026 Contango</div>
      <div class="footer-right">contango.news / commodity-watch</div>
    </footer>

    <script type="module" src="app.js"></script>
  </body>
</html>
