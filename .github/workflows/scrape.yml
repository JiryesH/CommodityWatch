name: Scrape Commodity News

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes, around the clock
  workflow_dispatch:           # also allows you to trigger a run manually from GitHub

concurrency:
  group: scrape-commodity-news
  cancel-in-progress: false

permissions:
  contents: write              # needed so the workflow can push the feed branch

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-core

      - name: Cache model downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: ${{ runner.os }}-ml-models-v1

      - name: Seed feed history
        run: |
          if git fetch origin feed-data:refs/remotes/origin/feed-data; then
            git show origin/feed-data:data/feed.json > data/feed.json
          else
            echo "No feed-data branch yet; seeding from the main branch snapshot."
          fi

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers spacy
          python -m spacy download en_core_web_lg

      - name: Run scraper
        run: python rss_scraper.py --output data/feed.json

      - name: Re-classify feed
        run: python classifier.py --all --input data/feed.json --output data/feed.json

      - name: Run sentiment enrichment
        run: |
          python sentiment_finbert.py \
            --input data/feed.json \
            --output data/feed.json \
            --pipeline-mode commodity_v1 \
            --context-mode auto

      - name: Run NER enrichment
        run: |
          python ner_spacy.py \
            --input data/feed.json \
            --output data/feed.json \
            --model en_core_web_lg

      - name: Publish updated feed branch
        run: |
          set -euo pipefail

          branch="feed-data"
          worktree="${RUNNER_TEMP}/feed-branch"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          rm -rf "${worktree}"
          git fetch origin "${branch}" || true

          if git show-ref --verify --quiet "refs/remotes/origin/${branch}"; then
            git worktree add --force -B "${branch}" "${worktree}" "origin/${branch}"
            branch_exists=1
          else
            git worktree add --detach "${worktree}" HEAD
            branch_exists=0
          fi

          cd "${worktree}"

          if [ "${branch_exists}" -eq 0 ]; then
            git switch --orphan "${branch}"
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p data
          cp "${GITHUB_WORKSPACE}/data/feed.json" data/feed.json

          git add data/feed.json
          git diff --cached --quiet && exit 0

          git commit -m "chore: update feed [skip ci]"
          git push origin "HEAD:${branch}"
