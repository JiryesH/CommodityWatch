name: Scrape Commodity News

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes, around the clock
  workflow_dispatch:           # also allows you to trigger a run manually from GitHub

permissions:
  contents: write              # needed so the workflow can commit feed.json back

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-core

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python rss_scraper.py --output data/feed.json

      - name: Commit updated feed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/feed.json
          # Only commit if the tracked snapshot actually changed.
          git diff --staged --quiet || git commit -m "chore: update feed [skip ci]"
          git push
