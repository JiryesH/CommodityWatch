name: InventoryWatch Tests

on:
  pull_request:
    paths:
      - ".github/workflows/inventorywatch-tests.yml"
      - "backend/app/**"
      - "backend/pyproject.toml"
      - "backend/seed/**"
      - "backend/tests/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/inventorywatch-tests.yml"
      - "backend/app/**"
      - "backend/pyproject.toml"
      - "backend/seed/**"
      - "backend/tests/**"
  workflow_dispatch:

jobs:
  inventorywatch-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: commoditywatch_inventorywatch_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d commoditywatch_inventorywatch_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CW_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/commoditywatch_inventorywatch_test
      CW_TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/commoditywatch_inventorywatch_test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend test dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Run InventoryWatch unit and integration tests
        run: .venv/bin/python -m pytest tests/unit/test_inventorywatch_*.py tests/integration/test_inventorywatch_*.py
