<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CommodityWatch | PriceWatch</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/site-shell.css" />
    <link rel="stylesheet" href="../shared/filter-bar.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="nav" role="navigation" aria-label="CommodityWatch product navigation">
      <div class="site-nav-main">
        <div class="nav-logo">CommodityWatch<span class="dot"></span></div>
        <div class="site-tabs" aria-label="Product views">
          <a class="site-tab" href="/">Home</a>
          <a class="site-tab" href="/headline-watch/">HeadlineWatch</a>
          <a class="site-tab" href="/price-watch/" aria-current="page">PriceWatch</a>
          <a class="site-tab" href="/calendar-watch/">CalendarWatch</a>
        </div>
      </div>
      <div class="nav-right">
        <div class="nav-search" id="nav-search">
          <button
            class="nav-search-toggle"
            id="search-toggle"
            type="button"
            title="Search prices"
            aria-label="Search prices"
            aria-expanded="false"
            aria-controls="commodity-search"
          >
            <svg
              width="17"
              height="17"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
          <div class="nav-search-panel">
            <input
              id="commodity-search"
              class="headline-search"
              type="search"
              placeholder="Search prices"
              aria-label="Search prices"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
        </div>
      </div>
    </nav>

    <div class="filter-wrap">
      <div class="filter-bar" role="toolbar" aria-label="Commodity sector filter">
        <button class="filter-pill is-selected" id="sector-reset" type="button" aria-pressed="true">All</button>
      <div class="filter-divider" aria-hidden="true"></div>
      <div class="sector-pill-row" id="sector-pills"></div>
      </div>
      <div class="filter-layer" id="subsector-layer" aria-hidden="true" hidden>
        <div class="filter-subsector-groups" id="subsector-groups"></div>
        <button class="filter-layer-clear" id="subsector-clear" type="button" hidden>clear</button>
      </div>
      <div class="subsector-hint" id="subsector-hint">
        <span class="subsector-hint-text">Select a sector to refine by subsector</span>
      </div>
    </div>

    <div class="status-bar">
      <div id="status-line" role="status" aria-live="polite"></div>
    </div>

    <main class="page-shell">
      <header class="masthead">
        <h1 class="masthead-headline">PriceWatch</h1>
      </header>

      <section class="catalog-empty" id="catalog-empty" hidden aria-live="polite">
        <p class="catalog-empty-title" id="catalog-empty-title"></p>
        <p class="catalog-empty-copy" id="catalog-empty-copy"></p>
      </section>

      <section class="catalog-root" id="catalog-root" aria-label="Commodity price catalog"></section>
    </main>

    <div class="detail-overlay" id="detail-overlay" hidden>
      <div class="detail-stage" id="detail-stage" role="dialog" aria-modal="true" aria-label="Commodity detail view">
        <button class="detail-close" id="detail-close" type="button" aria-label="Close commodity details">Close</button>
        <div class="detail-flip-card" id="detail-flip-card">
          <div class="detail-face detail-front" id="detail-front"></div>
          <div class="detail-face detail-back" id="detail-back"></div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-left">© 2026 CommodityWatch</div>
      <div class="footer-right">commoditywatch / price-watch</div>
    </footer>

    <button id="to-top-btn" class="to-top-btn" aria-label="Back to top" title="Back to top">
      <svg
        width="12"
        height="12"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.25"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M12 19V5" />
        <path d="M5 12l7-7 7 7" />
      </svg>
      Top
    </button>

    <script src="../shared/filter-shell.js"></script>
    <script src="../shared/click-spark.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
