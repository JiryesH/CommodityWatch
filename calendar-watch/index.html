<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CommodityWatch | CalendarWatch</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/site-shell.css" />
    <link rel="stylesheet" href="../shared/filter-bar.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="nav" role="navigation" aria-label="CommodityWatch product navigation">
      <div class="site-nav-main">
        <div class="nav-logo">CommodityWatch<span class="dot"></span></div>
        <div class="site-tabs" aria-label="Product views">
          <a class="site-tab" href="/">Home</a>
          <a class="site-tab" href="/headline-watch/">HeadlineWatch</a>
          <a class="site-tab" href="/price-watch/">PriceWatch</a>
          <a class="site-tab" href="/demand-watch/">DemandWatch</a>
          <span class="site-tab site-tab--disabled" aria-disabled="true">SupplyWatch</span>
          <a class="site-tab" href="/inventory-watch/">InventoryWatch</a>
          <span class="site-tab site-tab--disabled" aria-disabled="true">WeatherWatch</span>
          <a class="site-tab" href="/calendar-watch/" aria-current="page">CalendarWatch</a>
        </div>
      </div>
      <div class="nav-right">
        <div class="nav-search" id="nav-search">
          <button
            class="nav-search-toggle"
            id="search-toggle"
            type="button"
            title="Search releases"
            aria-label="Search releases"
            aria-expanded="false"
            aria-controls="calendar-search"
          >
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
          <div class="nav-search-panel">
            <input
              id="calendar-search"
              class="headline-search"
              type="search"
              placeholder="Search releases"
              aria-label="Search releases"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
        </div>
      </div>
    </nav>

    <div id="calendar-filter-root"></div>

    <main class="page-shell">
      <div id="calendar-root"></div>
    </main>

    <div class="drawer-overlay" id="drawer-overlay" hidden>
      <aside class="drawer-panel" id="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="drawer-title"></aside>
    </div>

    <footer class="footer">
      <div class="footer-left">© 2026 CommodityWatch</div>
      <div class="footer-right">commoditywatch / calendar-watch</div>
    </footer>

    <button id="to-top-btn" class="to-top-btn" aria-label="Back to top" title="Back to top">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 19V5"></path>
        <path d="M5 12l7-7 7 7"></path>
      </svg>
      Top
    </button>

    <script src="../shared/click-spark.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
