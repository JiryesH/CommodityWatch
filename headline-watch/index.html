<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommodityWatch | HeadlineWatch</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/site-shell.css">
<link rel="stylesheet" href="../shared/filter-bar.css">
<!--
  USAGE:
    1. python3 rss_scraper.py          (populate ignored local data/feed.local.json)
    2. python3 server.py               (serve HeadlineWatch + PriceWatch)
    3. open http://127.0.0.1:8080/

  Or to run both together:
    python3 rss_scraper.py --daemon --serve
-->
<style>
:root {
  --color-bg:        #F0EFE9;
  --color-surface:   #FFFFFF;
  --color-primary:   #0F1923;
  --color-amber:     #E8A020;
  --color-subtext:   #6B7280;
  --color-border:    #D1CEC8;
  --color-up:        #3A8F64;
  --color-down:      #E74C3C;
  --color-energy:    #E8A020;
  --color-metals:    #4A90D9;
  --color-agri:      #5BA85C;
  --nav-height:      52px;
  --filter-height:   52px;
  --feed-max:        680px;
  --header-text-case: none; /* options: none (use typed text), lowercase, capitalize */
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--color-bg);
  color: var(--color-primary);
  line-height: 1.5;
}

/* ── NAV ── */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--nav-height);
  background: var(--color-primary);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
}

.nav-logo {
  font-family: 'IBM Plex Serif', serif;
  font-weight: 200;
  font-size: 19px;
  color: #fff;
  letter-spacing: 0.02em;
  text-transform: var(--header-text-case);
  white-space: nowrap;
  user-select: none;
}

.nav-logo .dot {
  display: inline-block;
  width: 5px;
  height: 5px;
  background: var(--color-amber);
  border-radius: 50%;
  margin-left: 3px;
  vertical-align: middle;
  position: relative;
  top: -1px;
}

.nav-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
}

.nav-search {
  position: relative;
  display: flex;
  align-items: center;
}

.nav-search-toggle {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 2px;
  display: flex;
  align-items: center;
  color: rgba(255,255,255,0.72);
  transition: color 0.15s ease;
  flex-shrink: 0;
}

.nav-search-toggle:hover {
  color: #fff;
}

.nav-search.open .nav-search-toggle {
  color: var(--color-amber);
}

.nav-search-panel {
  position: absolute;
  top: calc(100% + 10px);
  right: 0;
  width: min(420px, calc(100vw - 32px));
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: 6px;
  padding: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  z-index: 130;
  opacity: 0;
  transform: translateY(-4px);
  pointer-events: none;
  transition: opacity 150ms ease, transform 150ms ease;
}

.nav-search.open .nav-search-panel {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.nav-live {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: var(--header-text-case);
  color: var(--color-primary);
  background: var(--color-amber);
  padding: 3px 10px 3px 8px;
  border-radius: 3px;
  line-height: 1;
}

.nav-live-dot {
  width: 6px;
  height: 6px;
  background: var(--color-primary);
  border-radius: 50%;
  animation: livePulse 2s ease-in-out infinite;
}

@keyframes livePulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}

.nav-bell {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 2px;
  display: flex;
  align-items: center;
  color: var(--color-primary);
  opacity: 0.4;
  transition: opacity 0.15s, color 0.15s;
  flex-shrink: 0;
}
.nav-bell:hover { opacity: 0.75; }
.nav-bell.enabled { opacity: 1; color: var(--color-amber); }
.nav-bell.denied  { opacity: 0.25; cursor: not-allowed; }

.nav-search-toggle:focus-visible,
.nav-bell:focus-visible,
.filter-pill:focus-visible,
.filter-chip:focus-visible,
.load-more-btn:focus-visible,
.to-top-btn:focus-visible,
.feed-headline a:focus-visible {
  outline: 2px solid var(--color-primary);
  outline-offset: 2px;
  border-radius: 4px;
}

/* ── COUNTRY POPOVER (HeadlineWatch-specific) ── */
.country-popover {
  position: fixed;
  top: 0;
  left: 0;
  width: min(320px, calc(100vw - 32px));
  max-height: min(360px, calc(100vh - var(--nav-height) - var(--filter-height) - 48px));
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  z-index: 125;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.country-popover[hidden] { display: none; }

.country-popover-head {
  padding: 8px;
  border-bottom: 1px solid var(--color-border);
}

.country-search-input {
  width: 100%;
  border: 1px solid var(--color-border);
  border-radius: 4px;
  background: #fff;
  color: var(--color-primary);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  padding: 7px 10px;
}

.country-search-input:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 2px rgba(22,22,22,0.09);
}

.country-popover-list {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
  padding: 4px 0;
  scrollbar-width: thin;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0)),
    var(--color-bg);
}

.country-option {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  color: var(--color-primary);
  cursor: pointer;
  transition: background 100ms ease;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.country-option:hover { background: rgba(0,0,0,0.04); }

.country-option-check {
  width: 14px;
  height: 14px;
  border: 1.5px solid var(--color-border);
  border-radius: 3px;
  flex-shrink: 0;
  transition: background 100ms ease, border-color 100ms ease;
}

.country-option.is-selected .country-option-check {
  background: var(--color-amber);
  border-color: var(--color-amber);
}

.country-option-label { flex: 1; }

.country-option-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--color-subtext);
}

.country-option.is-disabled {
  opacity: 0.38;
  pointer-events: none;
}

/* Selected country chips bar */
.country-chip-bar {
  background: var(--color-bg);
  padding: 6px 28px 8px;
  border-bottom: 1px solid var(--color-border);
}

.country-chip-bar[hidden] { display: none; }

.country-chip-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.country-active-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--color-primary);
  background: rgba(232,160,32,0.12);
  border: 1px solid rgba(232,160,32,0.3);
  border-radius: 3px;
  padding: 3px 6px 3px 8px;
}

.country-active-chip-dismiss {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--color-subtext);
  font-size: 13px;
  padding: 0 2px;
  line-height: 1;
}

.country-active-chip-dismiss:hover { color: var(--color-primary); }

.country-chip-clear {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--color-subtext);
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 4px;
}

.country-chip-clear:hover { color: var(--color-primary); }

.country-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--color-amber);
  margin-left: 2px;
}

.country-badge[hidden] { display: none; }

/* ── STATUS BAR ── */
.status-bar {
  background: var(--color-bg);
  border-bottom: 1px solid var(--color-border);
  padding: 0 24px;
  height: 30px;
  display: flex;
  align-items: center;
}

#status-line {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--color-subtext);
  letter-spacing: 0.03em;
  max-width: var(--feed-max);
  width: 100%;
}

.headline-search {
  width: 100%;
  border: 1px solid var(--color-border);
  border-radius: 4px;
  background: #fff;
  color: var(--color-primary);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px;
  line-height: 1.2;
  padding: 9px 11px;
}

.headline-search::placeholder {
  color: #7a7672;
}

.headline-search:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 2px rgba(22, 22, 22, 0.09);
}

/* ── NEW BADGE ── */
.feed-new-badge {
  display: inline-block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: var(--color-amber);
  color: var(--color-primary);
  padding: 2px 5px;
  border-radius: 2px;
  margin-left: 8px;
  vertical-align: middle;
  position: relative;
  top: -1px;
}

/* ── NEW ARTICLE TOAST ── */
.new-toast {
  position: fixed;
  top: calc(var(--nav-height) + var(--filter-height) + 10px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--color-primary);
  color: #fff;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.03em;
  padding: 9px 18px;
  border-radius: 4px;
  border-left: 3px solid var(--color-amber);
  cursor: pointer;
  z-index: 80;
  display: none;
  align-items: center;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  transition: opacity 300ms ease;
}

/* ── BACK TO TOP ── */
.to-top-btn {
  position: fixed;
  right: 24px;
  bottom: 24px;
  z-index: 85;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid var(--color-primary);
  background: var(--color-amber);
  color: var(--color-primary);
  border-radius: 20px;
  padding: 7px 10px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.02em;
  line-height: 1;
  cursor: pointer;
  box-shadow: 0 3px 12px rgba(15, 25, 35, 0.22);
  opacity: 0;
  pointer-events: none;
  transform: translateY(10px);
  transition: opacity 170ms ease, transform 170ms ease, background 150ms ease;
}

.to-top-btn.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.to-top-btn:hover {
  background: #f0ab2d;
}

.to-top-btn svg {
  display: block;
}

/* ── MASTHEAD ── */
.masthead {
  max-width: var(--feed-max);
  margin: 0 auto;
  padding: 32px 24px 24px;
  border-bottom: 1px solid var(--color-border);
}

.masthead-headline {
  font-family: 'IBM Plex Serif', serif;
  font-weight: 600;
  font-size: 24px;
  line-height: 1.25;
  color: var(--color-primary);
  margin-bottom: 0;
  letter-spacing: -0.01em;
}

.masthead-sub {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--color-subtext);
  line-height: 1.45;
  margin-bottom: 10px;
  max-width: 480px;
}

.masthead-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--color-amber);
  letter-spacing: 0.04em;
}

/* ── FEED ── */
.feed {
  max-width: var(--feed-max);
  margin: 0 auto;
  padding: 0 24px;
}

.feed-item {
  padding: 18px 0 16px;
  border-bottom: 1px solid var(--color-border);
  opacity: 0;
  transform: translateY(6px);
  animation: cardIn 300ms ease forwards;
}

.feed-item.hidden {
  display: none;
}

@keyframes cardIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.feed-cat {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}

.feed-cat-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.feed-cat-dot.energy { background: var(--color-energy); }
.feed-cat-dot.metals { background: var(--color-metals); }
.feed-cat-dot.agri   { background: var(--color-agri); }
.feed-cat-dot.other  { background: var(--color-border); }

.feed-cat-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--color-subtext);
}

.feed-headline {
  font-family: 'IBM Plex Serif', serif;
  font-weight: 600;
  font-size: 17px;
  line-height: 1.42;
  color: var(--color-primary);
  margin-bottom: 6px;
  letter-spacing: -0.005em;
  overflow-wrap: anywhere;
}

.feed-headline a {
  color: inherit;
  text-decoration: none;
  transition: color 150ms ease;
}

.feed-headline a:hover {
  color: var(--color-amber);
}

.feed-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--color-subtext);
  letter-spacing: 0.02em;
}

.feed-meta .sep {
  margin: 0 5px;
  opacity: 0.4;
}

.feed-time {
  white-space: nowrap;
}

.feed-time-exact {
  margin-left: 4px;
  opacity: 0.72;
}

.feed-time-invalid {
  opacity: 0.72;
}

.feed-sent {
  font-weight: 500;
}

.feed-sent-label {
  color: var(--color-subtext);
  font-weight: 400;
}

.feed-sent.positive {
  color: var(--color-up);
}

.feed-sent.negative {
  color: var(--color-down);
}

.feed-sent.neutral {
  color: var(--color-primary);
}

/* ── LOADING / ERROR / EMPTY ── */
.feed-loading,
.feed-error,
.feed-empty {
  padding: 48px 0 32px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--color-subtext);
  letter-spacing: 0.04em;
  line-height: 2;
}

.feed-error code {
  background: rgba(0,0,0,0.06);
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 11px;
  color: var(--color-primary);
}

/* ── LOAD MORE ── */
.load-more-wrap {
  max-width: var(--feed-max);
  margin: 0 auto;
  padding: 20px 24px 28px;
  text-align: left;
}

.load-more-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--color-subtext);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  letter-spacing: 0.02em;
  transition: color 150ms ease;
}

.load-more-btn:hover {
  color: var(--color-primary);
}

.load-more-btn.exhausted {
  pointer-events: none;
  opacity: 0.4;
}

/* ── FOOTER ── */
.footer {
  background: var(--color-primary);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 32px;
}

.footer-left {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.45);
}

.footer-right {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--color-amber);
  letter-spacing: 0.02em;
}

/* ── MOBILE ── */
@media (max-width: 640px) {
  .nav {
    padding: 0 16px;
  }

  .filter-wrap {
    top: var(--nav-height);
  }

  .filter-bar {
    padding: 0 16px;
  }

  .country-chip-bar {
    padding: 6px 16px 8px;
  }

  .status-bar {
    padding: 0 16px;
  }

  .nav-right {
    gap: 8px;
  }

  .nav-search-panel {
    width: calc(100vw - 32px);
  }

  .masthead {
    padding: 24px 16px 20px;
  }

  .masthead-headline {
    font-size: 21px;
  }

  .feed {
    padding: 0 16px;
  }

  .feed-headline {
    font-size: 16px;
    line-height: 1.4;
  }

  .load-more-wrap {
    padding: 18px 16px 24px;
  }

  .footer {
    flex-direction: column;
    gap: 4px;
    padding: 14px 16px;
    align-items: flex-start;
  }

  .new-toast {
    width: calc(100% - 32px);
    justify-content: center;
  }

  .to-top-btn {
    right: 16px;
    bottom: 16px;
  }
}
</style>
</head>
<body>

<nav class="nav" role="navigation" aria-label="CommodityWatch product navigation">
  <div class="site-nav-main">
    <div class="nav-logo">CommodityWatch<span class="dot"></span></div>
    <div class="site-tabs" aria-label="Product views">
      <a class="site-tab" href="/">Home</a>
      <a class="site-tab" href="/headline-watch/" aria-current="page">HeadlineWatch</a>
      <a class="site-tab" href="/price-watch/">PriceWatch</a>
      <a class="site-tab" href="/calendar-watch/">CalendarWatch</a>
    </div>
  </div>
  <div class="nav-right">
    <div class="nav-search" id="nav-search">
      <button
        class="nav-search-toggle"
        id="search-toggle"
        title="Search headlines"
        aria-label="Search headlines"
        aria-expanded="false"
        aria-controls="headline-search"
      >
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
      <div class="nav-search-panel">
        <input
          id="headline-search"
          class="headline-search"
          type="search"
          placeholder="Search headlines"
          aria-label="Search headlines"
          autocomplete="off"
          spellcheck="false"
        >
      </div>
    </div>
    <button class="nav-bell" id="notif-bell" title="Enable notifications" aria-label="Enable notifications">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </button>
    <div class="nav-live"><span class="nav-live-dot"></span>Live</div>
  </div>
</nav>

<div class="filter-wrap">
  <div class="filter-bar" role="toolbar" aria-label="Category filter">
    <button class="filter-pill is-selected" data-sector="ALL">All</button>
    <div class="filter-divider"></div>
    <button class="filter-pill" data-sector="energy" id="energy-toggle" aria-expanded="false" aria-controls="subsector-layer">Energy</button>
    <button class="filter-pill" data-sector="chemicals">Chemicals</button>
    <button class="filter-pill" data-sector="metals_and_mining" title="Metals and Mining">Metals &amp; Mining</button>
    <button class="filter-pill" data-sector="agriculture">Agriculture</button>
    <button class="filter-pill" data-sector="fertilizers" title="Fertilizers and Agricultural Chemicals">Fertilizers</button>
    <button class="filter-pill" data-sector="shipping">Shipping</button>
    <div class="filter-divider"></div>
    <button class="filter-pill country-toggle" id="country-toggle" aria-expanded="false" aria-controls="country-popover">Country <span class="country-badge" id="country-badge" hidden></span></button>
  </div>
  <div class="filter-layer" id="subsector-layer" aria-hidden="true" hidden>
    <div class="filter-chip-row" id="subsector-chips" role="group" aria-label="Energy subsectors" style="--sector-accent: var(--color-energy)">
      <button class="filter-chip" data-subsector="Oil - Crude">Crude <span class="filter-chip-count"></span></button>
      <button class="filter-chip" data-subsector="Oil - Refined Products">Refined <span class="filter-chip-count"></span></button>
      <button class="filter-chip" data-subsector="Natural Gas">Nat Gas <span class="filter-chip-count"></span></button>
      <button class="filter-chip" data-subsector="LNG">LNG <span class="filter-chip-count"></span></button>
      <button class="filter-chip" data-subsector="Coal">Coal <span class="filter-chip-count"></span></button>
      <button class="filter-chip" data-subsector="Electric Power">Power <span class="filter-chip-count"></span></button>
      <button class="filter-chip" data-subsector="Energy Transition">Transition <span class="filter-chip-count"></span></button>
      <button class="filter-layer-clear" id="subsector-clear" type="button" hidden>clear</button>
    </div>
  </div>
  <div class="country-popover" id="country-popover" hidden>
    <div class="country-popover-head">
      <input type="search" id="country-search" class="country-search-input" placeholder="Search countries" autocomplete="off" spellcheck="false">
    </div>
    <div class="country-popover-list" id="country-popover-list"></div>
  </div>
</div>

  <div class="country-chip-list" id="country-chip-list"></div>

  <span id="status-line">Connecting…</span>
</div>

  <button class="load-more-btn exhausted" id="loadMore">Loading…</button>
</div>

  <div class="footer-left">© 2026 CommodityWatch</div>
  <div class="footer-right">commoditywatch / headline-watch</div>

  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M12 19V5"/>
    <path d="M5 12l7-7 7 7"/>
  </svg>
  Top
</button>

<script src="../shared/filter-shell.js"></script>
<script src="../shared/headline-taxonomy.js"></script>
<script src="../shared/click-spark.js"></script>
<script>
(function () {
  'use strict';

  // ─── CONFIG ─────────────────────────────────────────────────────────────
  var FEED_URLS  = ['/data/feed.local.json', '/data/feed.json'];
  var PAGE_SIZE  = 25;
  var POLL_MS    = 90 * 1000; // poll every 90 seconds

  var CANONICAL_CATEGORIES = [
    'Oil - Crude',
    'Oil - Refined Products',
    'Natural Gas',
    'LNG',
    'Coal',
    'Electric Power',
    'Energy Transition',
    'Chemicals',
    'Metals',
    'Agriculture',
    'Fertilizers',
    'Shipping',
    'General'
  ];

  var headlineTaxonomy = window.CommodityWatchHeadlineTaxonomy || {};
  CANONICAL_CATEGORIES = headlineTaxonomy.CANONICAL_CATEGORIES || CANONICAL_CATEGORIES;
  var CATEGORY_PRIORITY = headlineTaxonomy.CATEGORY_PRIORITY || {};
  if (!Object.keys(CATEGORY_PRIORITY).length) {
    CANONICAL_CATEGORIES.forEach(function (cat, idx) {
      CATEGORY_PRIORITY[cat] = idx;
    });
  }
  var CAT_COLOR = headlineTaxonomy.CAT_COLOR || {
    'Oil - Crude': 'energy',
    'Oil - Refined Products': 'energy',
    'Natural Gas': 'energy',
    'LNG': 'energy',
    'Coal': 'energy',
    'Electric Power': 'energy',
    'Energy Transition': 'energy',
    'Chemicals': 'energy',
    'Metals': 'metals',
    'Agriculture': 'agri',
    'Fertilizers': 'agri',
    'Shipping': 'other',
    'General': 'other'
  };
  var CAT_LABEL = headlineTaxonomy.CAT_LABEL || {
    'General': 'General',
    'Oil - Crude': 'Crude',
    'Oil - Refined Products': 'Refined',
    'Natural Gas': 'Nat Gas',
    'Electric Power': 'Power',
    'Energy Transition': 'Energy Trans'
  };
  var ENERGY_CATS = headlineTaxonomy.ENERGY_CATS || [
    'Oil - Crude',
    'Oil - Refined Products',
    'Natural Gas',
    'LNG',
    'Coal',
    'Electric Power',
    'Energy Transition'
  ];
  var SECTOR_MAP = headlineTaxonomy.SECTOR_MAP || {
    'energy':             ENERGY_CATS,
    'chemicals':          ['Chemicals'],
    'metals_and_mining':  ['Metals'],
    'agriculture':        ['Agriculture'],
    'fertilizers':        ['Fertilizers'],
    'shipping':           ['Shipping']
  };

  var COUNTRY_NAME_OVERRIDES = {
    'Iran, Islamic Republic of': 'Iran',
    'Korea, Republic of': 'South Korea',
    'Korea, Democratic People\'s Republic of': 'North Korea',
    'Russian Federation': 'Russia',
    'Syrian Arab Republic': 'Syria',
    'Venezuela, Bolivarian Republic of': 'Venezuela',
    'Bolivia, Plurinational State of': 'Bolivia',
    'Moldova, Republic of': 'Moldova',
    'Tanzania, United Republic of': 'Tanzania',
    'Taiwan, Province of China': 'Taiwan',
    'Viet Nam': 'Vietnam',
    'Lao People\'s Democratic Republic': 'Laos',
    'Brunei Darussalam': 'Brunei',
    'Libyan Arab Jamahiriya': 'Libya'
  };

  // ─── STATE ──────────────────────────────────────────────────────────────
  var allArticles      = [];        // full sorted list from feed.json
  var filteredArticles = [];        // current filter view
  var renderedCount    = 0;         // pagination cursor
  var activeFilters    = new Set(); // empty = "All" mode; otherwise canonical categories
  var searchQuery      = '';        // lowercase text search on headline titles
  var selectedCountries = new Set(); // selected country keys (cleaned + lowercase)
  var displayedIds     = new Set(); // IDs currently rendered in the DOM
  var knownFeedIds     = new Set(); // IDs seen in the previous full feed snapshot
  var lastUpdated      = '';        // metadata.last_updated from last fetch
  var toastTimer       = null;

  // ─── DOM ────────────────────────────────────────────────────────────────
  var feed       = document.getElementById('feed');
  var loadBtn    = document.getElementById('loadMore');
  var statusLine = document.getElementById('status-line');
  var navSearch   = document.getElementById('nav-search');
  var searchToggle = document.getElementById('search-toggle');
  var searchInput = document.getElementById('headline-search');
  var filterWrapEl = document.querySelector('.filter-wrap');
  var subsectorLayer = document.getElementById('subsector-layer');
  var energyToggle = document.getElementById('energy-toggle');
  var subsectorClear = document.getElementById('subsector-clear');
  var countryToggle = document.getElementById('country-toggle');
  var countryPopover = document.getElementById('country-popover');
  var countrySearchInput = document.getElementById('country-search');
  var countryPopoverList = document.getElementById('country-popover-list');
  var countryBadge = document.getElementById('country-badge');
  var countryChipBar = document.getElementById('country-chip-bar');
  var countryChipList = document.getElementById('country-chip-list');
  var newToast   = document.getElementById('new-toast');
  var toTopBtn   = document.getElementById('to-top-btn');
  var filterShellApi = window.CommodityWatchFilterShell || null;

  // ─── UTILS ──────────────────────────────────────────────────────────────

  // Safe HTML escaping for any user-supplied string
  function esc(str) {
    var d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function safeExternalHref(rawUrl) {
    var raw = String(rawUrl || '').trim();
    if (!raw) return '';
    try {
      var url = new URL(raw, window.location.href);
      if (url.protocol === 'http:' || url.protocol === 'https:') return url.href;
    } catch (err) {}
    return '';
  }

  function canonicalCategoriesForArticle(article) {
    if (headlineTaxonomy.canonicalCategoriesForArticle) {
      return headlineTaxonomy.canonicalCategoriesForArticle(article);
    }

    var raw = article && article.categories;
    var tokens = [];

    if (Array.isArray(raw)) {
      tokens = raw.slice();
    } else if (article && article.category) {
      tokens = String(article.category).split(',');
    }

    var out = [];
    var seen = new Set();
    tokens.forEach(function (token) {
      var cat = String(token || '').trim();
      if (!cat || !Object.prototype.hasOwnProperty.call(CATEGORY_PRIORITY, cat) || seen.has(cat)) return;
      seen.add(cat);
      out.push(cat);
    });

    if (out.length === 0) out.push('General');
    out.sort(function (a, b) { return CATEGORY_PRIORITY[a] - CATEGORY_PRIORITY[b]; });
    return out;
  }

  function normalizeArticleCategoriesInPlace(article) {
    if (headlineTaxonomy.normalizeArticleCategoriesInPlace) {
      return headlineTaxonomy.normalizeArticleCategoriesInPlace(article);
    }

    var cats = canonicalCategoriesForArticle(article);
    article.categories = cats;
    article.category = cats[0];
    return article;
  }

  function validateCategoryContract(meta) {
    var backend = (meta && Array.isArray(meta.canonical_categories))
      ? meta.canonical_categories.slice().sort().join('|')
      : '';
    var frontend = CANONICAL_CATEGORIES.slice().sort().join('|');
    if (backend && backend !== frontend) {
      console.warn('Category contract mismatch between feed metadata and frontend constants.');
    }
  }

  // Dot color class from canonical article categories
  function dotClass(article) {
    if (headlineTaxonomy.dotClass) {
      return headlineTaxonomy.dotClass(article);
    }

    var cats = canonicalCategoriesForArticle(article);
    var priority = { energy: 3, metals: 2, agri: 1, other: 0 };
    var best = 'other';
    cats.forEach(function (cat) {
      var color = CAT_COLOR[cat] || 'other';
      if (priority[color] > priority[best]) best = color;
    });
    return best;
  }

  function sourceLabel(source) {
    var normalized = String(source || '').toLowerCase();
    if (normalized.indexOf('argus') !== -1) return 'ARGUS';
    if (normalized.indexOf('icis') !== -1) return 'ICIS';
    if (normalized.indexOf('fastmarkets') !== -1) return 'FASTMARKETS';
    if (normalized.indexOf('s&p') !== -1 || normalized.indexOf('sp global') !== -1) return 'S&P';
    return 'COMMODITY';
  }

  // Short label shown next to the dot in a card
  function dotLabel(article) {
    if (headlineTaxonomy.dotLabel) {
      return esc(headlineTaxonomy.dotLabel(article));
    }

    var primary = canonicalCategoriesForArticle(article)[0] || 'General';
    return esc(CAT_LABEL[primary] || primary);
  }

  // Does this article match the current active filter selection?
  function matchesFilters(article) {
    if (activeFilters.size === 0) return true; // "All" mode
    var cats = canonicalCategoriesForArticle(article);
    for (var i = 0; i < cats.length; i++) {
      if (activeFilters.has(cats[i])) return true;
    }
    return false;
  }

  // Title search (case-insensitive, headline text only)
  function matchesSearch(title) {
    if (!searchQuery) return true;
    return (title || '').toLowerCase().indexOf(searchQuery) !== -1;
  }

  function matchesCategoryAndSearch(article) {
    return matchesFilters(article) && matchesSearch(article.title);
  }

  function matchesCountry(article) {
    if (selectedCountries.size === 0) return true;
    var ner = article && article.ner;
    var countries = (ner && Array.isArray(ner.countries)) ? ner.countries : [];
    for (var i = 0; i < countries.length; i++) {
      var key = cleanCountryName(countries[i]).toLowerCase();
      if (selectedCountries.has(key)) {
        return true;
      }
    }
    return false;
  }

  function matchesArticle(article) {
    return (
      matchesCategoryAndSearch(article) &&
      matchesCountry(article)
    );
  }

  var exactDateFmt = new Intl.DateTimeFormat(undefined, {
    year: 'numeric',
    month: 'short',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    timeZoneName: 'short'
  });

  function parseIsoDate(iso) {
    if (typeof iso !== 'string' || !iso.trim()) return null;
    var dt = new Date(iso);
    if (!Number.isFinite(dt.getTime())) return null;
    return dt;
  }

  function relTimeFromDate(dt) {
    if (!dt) return '—';
    var d = Math.round((Date.now() - dt.getTime()) / 1000);
    if (!Number.isFinite(d)) return '—';

    var future = d < 0;
    var abs = Math.abs(d);
    var unit;

    if (abs < 60) {
      unit = '<1m';
    } else if (abs < 3600) {
      unit = Math.floor(abs / 60) + 'm';
    } else if (abs < 86400) {
      unit = Math.floor(abs / 3600) + 'h';
    } else {
      unit = Math.floor(abs / 86400) + 'd';
    }

    return future ? ('in ' + unit) : (unit + ' ago');
  }

  function exactTime(iso) {
    var dt = parseIsoDate(iso);
    if (!dt) return '';
    return exactDateFmt.format(dt);
  }

  function relTime(iso) {
    return relTimeFromDate(parseIsoDate(iso));
  }

  function timeMeta(iso) {
    var exact = exactTime(iso);
    if (!exact) {
      return '<span class="feed-time feed-time-invalid">—</span>';
    }
    var rel = relTime(iso);
    return (
      '<span class="feed-time" title="' + esc(exact) + '">' + esc(rel) + '</span>' +
      '<span class="feed-time-exact">(' + esc(exact) + ')</span>'
    );
  }

  function sep() { return '<span class="sep">·</span>'; }

  function sentimentMeta(article) {
    var sentiment = article && article.sentiment;
    if (!sentiment || typeof sentiment !== 'object') return '';

    var label = String(sentiment.label || '').toLowerCase();
    if (label !== 'positive' && label !== 'negative' && label !== 'neutral') return '';

    var title = label.charAt(0).toUpperCase() + label.slice(1);
    return (
      '<span class="feed-sent ' + label + '">' +
      '<span class="feed-sent-label">Sentiment:</span> ' + esc(title) +
      '</span>'
    );
  }

  function cleanCountryName(country) {
    var raw = String(country || '').trim();
    if (!raw) return '';
    if (COUNTRY_NAME_OVERRIDES[raw]) return COUNTRY_NAME_OVERRIDES[raw];
    return raw;
  }

  function countryKey(country) {
    return cleanCountryName(country).toLowerCase();
  }

  function collectCountries(articles) {
    var seenKey = new Set();
    var out = [];
    (articles || []).forEach(function (article) {
      var ner = article && article.ner;
      var countries = (ner && Array.isArray(ner.countries)) ? ner.countries : [];
      countries.forEach(function (country) {
        var label = cleanCountryName(country);
        var key = countryKey(country);
        if (!label || !key || seenKey.has(key)) return;
        seenKey.add(key);
        out.push({ key: key, label: label });
      });
    });
    out.sort(function (a, b) { return a.label.localeCompare(b.label); });
    return out;
  }

  function buildCountryAvailability(articles) {
    var counts = new Map();
    (articles || []).forEach(function (article) {
      if (!matchesCategoryAndSearch(article)) return;
      var ner = article && article.ner;
      var countries = (ner && Array.isArray(ner.countries)) ? ner.countries : [];
      countries.forEach(function (country) {
        var key = countryKey(country);
        if (!key) return;
        counts.set(key, (counts.get(key) || 0) + 1);
      });
    });
    return counts;
  }

  function areSetsEqual(a, b) {
    if (a.size !== b.size) return false;
    var equal = true;
    a.forEach(function (value) {
      if (!b.has(value)) equal = false;
    });
    return equal;
  }

  function eventPathIncludes(event, element) {
    if (!event || !element) return false;
    if (typeof event.composedPath === 'function') {
      var path = event.composedPath();
      if (Array.isArray(path) && path.indexOf(element) !== -1) return true;
    }
    return element.contains(event.target);
  }

  function positionCountryPopover() {
    if (!countryPopover || !countryToggle) return;
    var toggleRect = countryToggle.getBoundingClientRect();
    var viewportPadding = 16;
    var popoverWidth = Math.min(320, window.innerWidth - (viewportPadding * 2));
    var left = toggleRect.right - popoverWidth;
    left = Math.max(viewportPadding, Math.min(left, window.innerWidth - popoverWidth - viewportPadding));

    countryPopover.style.width = popoverWidth + 'px';
    countryPopover.style.left = left + 'px';
    countryPopover.style.top = (toggleRect.bottom + 10) + 'px';
  }

  // ─── COUNTRY POPOVER ────────────────────────────────────────────────

  function setCountryPopover(open) {
    if (!countryPopover) return;
    countryPopover.hidden = !open;
    if (countryToggle) countryToggle.setAttribute('aria-expanded', String(open));
    if (open) {
      positionCountryPopover();
    }
    if (open && countrySearchInput) {
      countrySearchInput.value = '';
      filterCountryList('');
      setTimeout(function () { countrySearchInput.focus(); }, 60);
    }
  }

  function toggleCountryPopover() {
    var isOpen = countryPopover && !countryPopover.hidden;
    if (!isOpen) setSubsectorLayer(false);
    setCountryPopover(!isOpen);
  }

  function syncCountryUi() {
    // Update popover active states
    if (countryPopoverList) {
      countryPopoverList.querySelectorAll('.country-option').forEach(function (btn) {
        var key = btn.dataset.countryKey;
        btn.classList.toggle('is-selected', selectedCountries.has(key));
      });
    }

    // Update toggle button badge
    if (countryToggle) {
      countryToggle.classList.toggle('is-selected', selectedCountries.size > 0);
    }
    if (countryBadge) {
      countryBadge.hidden = selectedCountries.size === 0;
      countryBadge.textContent = '(' + selectedCountries.size + ')';
    }

    // Render selected chips bar
    renderSelectedCountryChips();
  }

  function clearCountrySelection() {
    if (selectedCountries.size === 0) return;
    selectedCountries.clear();
    syncCountryUi();
    refreshFeed();
    setStatus(_lastMeta);
  }

  function toggleCountrySelection(key) {
    if (!key) {
      clearCountrySelection();
      return;
    }
    if (selectedCountries.has(key)) {
      selectedCountries.delete(key);
    } else {
      selectedCountries.add(key);
    }
    syncCountryUi();
    refreshFeed();
    setStatus(_lastMeta);
  }

  var _countryData = []; // cached country list for chip label lookups

  function updateCountryOptions(articles) {
    if (!countryPopoverList) return false;

    var previous = new Set(selectedCountries);
    var countries = collectCountries(articles);
    var availability = buildCountryAvailability(articles);
    _countryData = countries;
    countryPopoverList.innerHTML = '';

    countries.forEach(function (country) {
      var count = availability.get(country.key) || 0;
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'country-option' +
        (selectedCountries.has(country.key) ? ' is-selected' : '') +
        (count === 0 ? ' is-disabled' : '');
      btn.dataset.countryKey = country.key;
      btn.innerHTML =
        '<span class="country-option-check"></span>' +
        '<span class="country-option-label">' + esc(country.label) + '</span>' +
        '<span class="country-option-count">' + count + '</span>';
      if (count > 0) {
        btn.addEventListener('click', function (event) {
          event.preventDefault();
          event.stopPropagation();
          toggleCountrySelection(country.key);
        });
      }
      countryPopoverList.appendChild(btn);
    });

    // Prune selections for countries that are no longer available
    var availableKeys = new Set(
      countries
        .filter(function (c) { return (availability.get(c.key) || 0) > 0; })
        .map(function (c) { return c.key; })
    );
    selectedCountries.forEach(function (key) {
      if (!availableKeys.has(key)) selectedCountries.delete(key);
    });

    syncCountryUi();
    return !areSetsEqual(previous, selectedCountries);
  }

  function filterCountryList(query) {
    var q = (query || '').trim().toLowerCase();
    if (!countryPopoverList) return;
    countryPopoverList.querySelectorAll('.country-option').forEach(function (btn) {
      var label = btn.querySelector('.country-option-label');
      var text = (label ? label.textContent : '').toLowerCase();
      btn.style.display = (!q || text.indexOf(q) !== -1) ? '' : 'none';
    });
  }

  function renderSelectedCountryChips() {
    if (!countryChipBar || !countryChipList) return;
    countryChipBar.hidden = selectedCountries.size === 0;
    countryChipList.innerHTML = '';

    selectedCountries.forEach(function (key) {
      // Find display label from cached data
      var label = key;
      for (var i = 0; i < _countryData.length; i++) {
        if (_countryData[i].key === key) { label = _countryData[i].label; break; }
      }

      var chip = document.createElement('span');
      chip.className = 'country-active-chip';
      chip.innerHTML = esc(label) +
        '<button class="country-active-chip-dismiss" type="button" aria-label="Remove ' + esc(label) + '">&times;</button>';
      chip.querySelector('.country-active-chip-dismiss').addEventListener('click', function () {
        selectedCountries.delete(key);
        syncCountryUi();
        refreshFeed();
        setStatus(_lastMeta);
      });
      countryChipList.appendChild(chip);
    });

    if (selectedCountries.size > 1) {
      var clearAll = document.createElement('button');
      clearAll.type = 'button';
      clearAll.className = 'country-chip-clear';
      clearAll.textContent = 'clear all';
      clearAll.addEventListener('click', clearCountrySelection);
      countryChipList.appendChild(clearAll);
    }
  }

  // ─── CARD ───────────────────────────────────────────────────────────────

  function makeCard(article, delay, isNew) {
    var hidden = !matchesArticle(article);
    var dc     = dotClass(article);
    var primaryCategory = canonicalCategoriesForArticle(article)[0] || 'General';
    var safeLink = safeExternalHref(article.link);
    var title = esc(article.title || '(no title)');
    var headlineHtml = safeLink
      ? '<a href="' + esc(safeLink) + '" target="_blank" rel="noopener noreferrer">' + title + '</a>'
      : title;

    var el = document.createElement('article');
    el.className = 'feed-item' + (hidden ? ' hidden' : '');
    el.dataset.id = article.id || '';
    el.style.animationDelay = (hidden ? 0 : delay) + 'ms';

    // Meta line: "ICIS · 3m ago" or "S&P Global · Crude · 14m ago"
    var metaParts = [esc(article.source || '')];
    if (primaryCategory !== 'General') {
      metaParts.push(esc(CAT_LABEL[primaryCategory] || primaryCategory));
    }
    metaParts.push(timeMeta(article.published));
    var sentimentHTML = sentimentMeta(article);
    if (sentimentHTML) metaParts.push(sentimentHTML);
    var metaHTML = metaParts.join(sep());

    el.innerHTML =
      '<div class="feed-cat">' +
        '<span class="feed-cat-dot ' + dc + '"></span>' +
        '<span class="feed-cat-label">' + dotLabel(article) + '</span>' +
        (isNew ? '<span class="feed-new-badge">New</span>' : '') +
      '</div>' +
      '<h3 class="feed-headline">' +
        headlineHtml +
      '</h3>' +
      '<div class="feed-meta">' + metaHTML + '</div>';

    return el;
  }

  // ─── RENDER ─────────────────────────────────────────────────────────────

  function renderPage(highlightIds) {
    var batch = filteredArticles.slice(renderedCount, renderedCount + PAGE_SIZE);
    if (batch.length === 0) { syncLoadBtn(); return; }

    var frag = document.createDocumentFragment();
    batch.forEach(function (a, i) {
      var isNew = !!(highlightIds && a.id && highlightIds.has(a.id));
      var el = makeCard(a, i * 25, isNew);
      if (a.id) displayedIds.add(a.id);
      frag.appendChild(el);
    });
    feed.appendChild(frag);
    renderedCount += batch.length;
    syncLoadBtn();
  }

  function syncLoadBtn() {
    var remaining = filteredArticles.length - renderedCount;
    if (remaining <= 0) {
      loadBtn.textContent = !allArticles.length
        ? 'No headlines yet'
        : (filteredArticles.length
          ? 'All ' + filteredArticles.length + ' headlines loaded'
          : 'No matching headlines');
      loadBtn.classList.add('exhausted');
    } else {
      loadBtn.textContent = 'Load ' + Math.min(remaining, PAGE_SIZE) + ' more ↓';
      loadBtn.classList.remove('exhausted');
    }
  }

  function refreshFeed(options) {
    options = options || {};
    updateCountryOptions(allArticles);
    updateSubsectorCounts();
    filteredArticles = allArticles.filter(function (a) { return matchesArticle(a); });

    var desiredCount = PAGE_SIZE;
    if (typeof options.targetCount === 'number' && Number.isFinite(options.targetCount)) {
      desiredCount = options.targetCount;
    } else if (options.preserveCount) {
      desiredCount = Math.max(renderedCount, PAGE_SIZE);
    }
    desiredCount = Math.max(0, Math.min(desiredCount, filteredArticles.length));

    renderedCount = 0;
    displayedIds.clear();
    feed.innerHTML = '';

    if (allArticles.length === 0) {
      feed.innerHTML = '<div class="feed-empty">No headlines are available yet. Run a scrape to populate the feed.</div>';
      syncLoadBtn();
      return;
    }

    if (filteredArticles.length === 0) {
      feed.innerHTML = '<div class="feed-empty">No headlines match your current filters.</div>';
      syncLoadBtn();
      return;
    }

    while (renderedCount < desiredCount) {
      renderPage(options.highlightIds);
    }
  }

  function hasAnyEnergySelected() {
    for (var i = 0; i < ENERGY_CATS.length; i++) {
      if (activeFilters.has(ENERGY_CATS[i])) return true;
    }
    return false;
  }

  function areAllEnergySelected() {
    for (var i = 0; i < ENERGY_CATS.length; i++) {
      if (!activeFilters.has(ENERGY_CATS[i])) return false;
    }
    return true;
  }

  function setSubsectorLayer(open) {
    if (!subsectorLayer) return;
    if (filterShellApi && filterShellApi.setLayerOpen) {
      filterShellApi.setLayerOpen(energyToggle, subsectorLayer, open);
      return;
    }
    subsectorLayer.hidden = !open;
    subsectorLayer.classList.toggle('open', open);
    subsectorLayer.setAttribute('aria-hidden', String(!open));
    if (energyToggle) energyToggle.setAttribute('aria-expanded', String(open));
  }

  // Toggle a sector pill: maps data-sector to classifier categories
  function toggleSector(sectorKey) {
    if (sectorKey === 'ALL') {
      activeFilters.clear();
      setSubsectorLayer(false);
      setCountryPopover(false);
    } else {
      var cats = SECTOR_MAP[sectorKey];
      if (!cats) return;
      // Check if ALL categories for this sector are already active
      var allActive = cats.every(function (c) { return activeFilters.has(c); });
      if (allActive) {
        cats.forEach(function (c) { activeFilters.delete(c); });
      } else {
        cats.forEach(function (c) { activeFilters.add(c); });
      }
      // Close subsector layer if not energy-related
      if (sectorKey !== 'energy' && !hasAnyEnergySelected()) {
        setSubsectorLayer(false);
      }
    }
    syncPills();
    refreshFeed();
    setStatus(_lastMeta);
  }

  // Sync pill active states to match activeFilters
  function syncPills() {
    var allBtn = document.querySelector('[data-sector="ALL"]');
    var isEmpty = activeFilters.size === 0;
    if (allBtn) {
      allBtn.classList.toggle('is-selected', isEmpty);
      allBtn.setAttribute('aria-pressed', isEmpty ? 'true' : 'false');
    }

    // Sync sector pills
    document.querySelectorAll('.filter-pill[data-sector]:not([data-sector="ALL"])').forEach(function (p) {
      var sectorKey = p.dataset.sector;
      var cats = SECTOR_MAP[sectorKey];
      if (!cats) {
        // Country toggle — handled separately
        return;
      }
      var anyActive = isEmpty || cats.some(function (c) { return activeFilters.has(c); });
      var allActive = isEmpty || cats.every(function (c) { return activeFilters.has(c); });
      p.classList.toggle('is-selected', anyActive);
      p.classList.toggle('is-partial', !isEmpty && anyActive && !allActive);
      p.setAttribute('aria-pressed', anyActive ? 'true' : 'false');
    });

    // Sync energy subsector chips
    if (subsectorLayer) {
      subsectorLayer.querySelectorAll('.filter-chip').forEach(function (chip) {
        var active = activeFilters.has(chip.dataset.subsector);
        chip.classList.toggle('is-selected', active);
        chip.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
      // Show/hide clear button
      if (subsectorClear) {
        var anySubSelected = hasAnyEnergySelected() && !areAllEnergySelected();
        subsectorClear.hidden = !anySubSelected;
      }
    }

    syncCountryUi();
  }

  function toggleEnergyGroup() {
    setCountryPopover(false);

    var anyEnergy = hasAnyEnergySelected();
    var layerOpen = subsectorLayer && subsectorLayer.classList.contains('open');

    if (!anyEnergy) {
      ENERGY_CATS.forEach(function (cat) { activeFilters.add(cat); });
      setSubsectorLayer(true);
    } else if (!layerOpen) {
      setSubsectorLayer(true);
    } else {
      ENERGY_CATS.forEach(function (cat) { activeFilters.delete(cat); });
      setSubsectorLayer(false);
    }

    syncPills();
    refreshFeed();
    setStatus(_lastMeta);
  }

  function toggleSubsector(cat) {
    if (!cat) return;
    if (activeFilters.has(cat)) {
      activeFilters.delete(cat);
    } else {
      activeFilters.add(cat);
    }

    if (!hasAnyEnergySelected()) setSubsectorLayer(false);
    syncPills();
    refreshFeed();
    setStatus(_lastMeta);
  }

  function updateSubsectorCounts() {
    if (!subsectorLayer) return;
    subsectorLayer.querySelectorAll('.filter-chip').forEach(function (chip) {
      var cat = chip.dataset.subsector;
      var count = 0;
      for (var i = 0; i < allArticles.length; i++) {
        if (canonicalCategoriesForArticle(allArticles[i]).indexOf(cat) !== -1) count++;
      }
      var badge = chip.querySelector('.filter-chip-count');
      if (badge) badge.textContent = count;
    });
  }

  // ─── STATUS LINE ────────────────────────────────────────────────────────
  var _lastMeta = {};

  function setStatus(meta) {
    if (!meta) meta = _lastMeta;
    _lastMeta = meta;
    if (!statusLine) return;
    var total     = meta.total_articles || 0;
    var ok        = meta.feeds_fetched  || 0;
    var totalFeeds = ok + (meta.feeds_failed || 0);
    var updRel    = relTime(meta.last_updated);
    var updExact  = exactTime(meta.last_updated);
    var upd       = updExact ? (updRel + ' (' + updExact + ')') : updRel;
    var scoped    = activeFilters.size > 0 || searchQuery.length > 0 || selectedCountries.size > 0;
    var showing   = (scoped && filteredArticles.length !== total)
      ? filteredArticles.length + ' of ' + total
      : total;
    statusLine.textContent =
      showing + ' articles · ' + ok + '/' + totalFeeds + ' feeds live · updated ' + upd;
  }

  function openSearch() {
    if (!navSearch || !searchToggle) return;
    navSearch.classList.add('open');
    searchToggle.setAttribute('aria-expanded', 'true');
  }

  function closeSearch() {
    if (!navSearch || !searchToggle) return;
    navSearch.classList.remove('open');
    searchToggle.setAttribute('aria-expanded', 'false');
  }

  function syncToTopBtn() {
    if (!toTopBtn) return;
    toTopBtn.classList.toggle('visible', window.scrollY > 360);
  }

  // ─── TOAST ──────────────────────────────────────────────────────────────

  function showToast(n) {
    if (!newToast) return;
    newToast.textContent = '↑ ' + n + ' new headline' + (n > 1 ? 's' : '') + ' — scroll up';
    newToast.style.opacity = '1';
    newToast.style.display = 'flex';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(dismissToast, 8000);
  }

  function dismissToast() {
    if (!newToast) return;
    newToast.style.opacity = '0';
    setTimeout(function () { newToast.style.display = 'none'; }, 300);
  }

  // ─── FETCH ──────────────────────────────────────────────────────────────

  function fetchFeedPayload() {
    function attempt(index) {
      if (index >= FEED_URLS.length) {
        return Promise.reject(new Error('No headline feed available'));
      }

      return fetch(FEED_URLS[index] + '?t=' + Date.now())
        .then(function (r) {
          if (r.ok) return r.json();
          if (r.status === 404 && index < FEED_URLS.length - 1) {
            return attempt(index + 1);
          }
          throw new Error('HTTP ' + r.status);
        })
        .catch(function (err) {
          if (index < FEED_URLS.length - 1) {
            return attempt(index + 1);
          }
          throw err;
        });
    }

    return attempt(0);
  }

  function fetchFeed(isPoll) {
    // Cache-bust so the browser doesn't serve stale JSON
    return fetchFeedPayload()
      .then(function (data) {
        var articles = (data.articles || []).map(function (article) {
          return normalizeArticleCategoriesInPlace(article);
        });
        var meta     = data.metadata  || {};
        validateCategoryContract(meta);

        if (!isPoll) {
          // ── Initial load ──────────────────────────────────────────
          allArticles = articles;
          knownFeedIds = new Set(
            articles
              .map(function (a) { return a && a.id; })
              .filter(Boolean)
          );
          updateCountryOptions(allArticles);
          updateSubsectorCounts();
          lastUpdated = meta.last_updated || '';
          feed.innerHTML = '';
          refreshFeed();
          setStatus(meta);

        } else {
          // ── Poll: detect new articles ──────────────────────────────
          // If last_updated hasn't changed, nothing is new
          if (meta.last_updated && meta.last_updated === lastUpdated) {
            setStatus(meta); // still update relative times
            return;
          }
          lastUpdated = meta.last_updated || lastUpdated;
          var previousKnownIds = knownFeedIds;
          knownFeedIds = new Set(
            articles
              .map(function (a) { return a && a.id; })
              .filter(Boolean)
          );
          allArticles = articles;
          var countrySelectionChanged = updateCountryOptions(allArticles);
          updateSubsectorCounts();

          if (countrySelectionChanged) {
            refreshFeed({ preserveCount: true });
            setStatus(meta);
            return;
          }

          var newOnes = articles.filter(function (a) {
            return a.id && !previousKnownIds.has(a.id);
          });

          if (newOnes.length === 0) {
            refreshFeed({ preserveCount: true });
            setStatus(meta);
            return;
          }

          var matchingNewIds = new Set();
          newOnes.forEach(function (a) {
            if (a && a.id && matchesArticle(a)) matchingNewIds.add(a.id);
          });
          refreshFeed({
            targetCount: Math.max(renderedCount, PAGE_SIZE) + matchingNewIds.size,
            highlightIds: matchingNewIds
          });
          if (matchingNewIds.size > 0) showToast(matchingNewIds.size);

          // Tab title + OS notification for all new articles (regardless of filter)
          unreadCount += newOnes.length;
          if (document.hidden) setTabTitle(unreadCount);
          fireNotification(newOnes.length);

          setStatus(meta);
        }
      })
      .catch(function (err) {
        if (!isPoll) {
          // Only replace the feed with an error on the initial load
          var isCORS = err.message.toLowerCase().includes('fetch') ||
                       err.message.toLowerCase().includes('network');
          var msg = isCORS
            ? 'Could not load <code>/data/feed.local.json</code> or <code>/data/feed.json</code>.<br>' +
              'Run the scraper first: <code>python3 rss_scraper.py</code><br>' +
              'Then serve via: <code>python3 server.py</code><br>' +
              'And open: <code>http://127.0.0.1:8080/</code>'
            : 'Error loading feed: ' + esc(err.message);

          feed.innerHTML = '<div class="feed-error">' + msg + '</div>';
          loadBtn.textContent = '—';
          loadBtn.classList.add('exhausted');
          if (statusLine) statusLine.textContent = 'Feed unavailable';
        }
        // On poll errors, fail silently — don't disrupt the visible feed
      });
  }

  // ─── NOTIFICATIONS ──────────────────────────────────────────────────────

  var bellBtn     = document.getElementById('notif-bell');
  var unreadCount = 0;
  var BASE_TITLE  = document.title; // "CommodityWatch — Commodity Headlines"

  function updateBellState() {
    if (!bellBtn || !('Notification' in window)) return;
    var perm = Notification.permission;
    bellBtn.classList.toggle('enabled', perm === 'granted');
    bellBtn.classList.toggle('denied',  perm === 'denied');
    bellBtn.title = perm === 'granted'  ? 'Notifications on' :
                    perm === 'denied'   ? 'Notifications blocked — change in browser settings' :
                                          'Enable notifications';
    bellBtn.setAttribute('aria-label', bellBtn.title);
  }

  function fireNotification(n) {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    if (!document.hidden) return; // tab is visible — toast is enough
    var body = n === 1 ? '1 new headline' : n + ' new headlines';
    try { new Notification('CommodityWatch', { body: body }); } catch (e) {}
  }

  function setTabTitle(n) {
    document.title = n > 0 ? '(' + n + ') ' + BASE_TITLE : BASE_TITLE;
  }

  // Reset unread badge when tab comes back into focus
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden) {
      unreadCount = 0;
      setTabTitle(0);
    }
  });

  if (bellBtn) {
    if (!('Notification' in window)) {
      bellBtn.style.display = 'none'; // browser doesn't support it
    } else {
      updateBellState();
      bellBtn.addEventListener('click', function () {
        if (Notification.permission === 'denied') return;
        if (Notification.permission === 'granted') return; // already on
        Notification.requestPermission().then(function () { updateBellState(); });
      });
    }
  }

  // ─── EVENTS ─────────────────────────────────────────────────────────────

  // Sector pills
  document.querySelectorAll('.filter-pill[data-sector]').forEach(function (pill) {
    var sector = pill.dataset.sector;
    if (sector === 'energy') return; // energy toggle handled separately
    if (pill.classList.contains('country-toggle')) return; // country handled separately
    pill.addEventListener('click', function () {
      toggleSector(sector);
    });
  });

  if (energyToggle) {
    energyToggle.addEventListener('click', function () {
      toggleEnergyGroup();
    });
  }

  if (countryToggle) {
    countryToggle.addEventListener('click', function () {
      toggleCountryPopover();
    });
  }

  if (countrySearchInput) {
    countrySearchInput.addEventListener('input', function () {
      filterCountryList(countrySearchInput.value);
    });
  }

  if (subsectorLayer) {
    subsectorLayer.querySelectorAll('.filter-chip').forEach(function (chip) {
      chip.addEventListener('click', function () {
        toggleSubsector(chip.dataset.subsector);
      });
    });
  }

  if (subsectorClear) {
    subsectorClear.addEventListener('click', function () {
      ENERGY_CATS.forEach(function (cat) { activeFilters.add(cat); });
      syncPills();
      refreshFeed();
      setStatus(_lastMeta);
    });
  }

  // Search input
  if (searchInput) {
    if (searchToggle) {
      searchToggle.addEventListener('click', function () {
        if (navSearch && navSearch.classList.contains('open')) {
          closeSearch();
          return;
        }
        openSearch();
        searchInput.focus();
      });
    }

    searchInput.addEventListener('input', function () {
      searchQuery = (searchInput.value || '').trim().toLowerCase();
      refreshFeed();
      setStatus(_lastMeta);
    });

    searchInput.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        if (searchInput.value) {
          searchInput.value = '';
          searchQuery = '';
          refreshFeed();
          setStatus(_lastMeta);
        } else {
          closeSearch();
          if (searchToggle) searchToggle.focus();
        }
      }
    });
  }

  // Close search when clicking outside of it
  document.addEventListener('click', function (e) {
    if (navSearch && navSearch.classList.contains('open')) {
      if (!eventPathIncludes(e, navSearch)) closeSearch();
    }

    if (filterWrapEl && !eventPathIncludes(e, filterWrapEl)) {
      if (subsectorLayer && subsectorLayer.classList.contains('open')) setSubsectorLayer(false);
      if (countryPopover && !countryPopover.hidden) setCountryPopover(false);
    }
  });

  // Load more
  loadBtn.addEventListener('click', function () {
    if (!loadBtn.classList.contains('exhausted')) renderPage();
  });

  // Toast click → scroll to top
  if (newToast) {
    newToast.addEventListener('click', function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      dismissToast();
    });
  }

  if (toTopBtn) {
    toTopBtn.addEventListener('click', function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  window.addEventListener('scroll', function () {
    syncToTopBtn();
    if (countryPopover && !countryPopover.hidden) positionCountryPopover();
  }, { passive: true });

  window.addEventListener('resize', function () {
    if (countryPopover && !countryPopover.hidden) positionCountryPopover();
  });

  // ─── INIT ────────────────────────────────────────────────────────────────
  feed.innerHTML = '<div class="feed-loading">Fetching headlines…</div>';
  syncPills();
  syncToTopBtn();

  fetchFeed(false).then(function () {
    // Start polling after the initial load succeeds
    setInterval(function () { fetchFeed(true); }, POLL_MS);
  });

})();
</script>

</body>
</html>
